<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 뉴스 비서 | 소상공인 뉴스 대시보드</title>
    <meta name="description" content="AI가 매일 수집·분석하는 소상공인 종합지원 뉴스 브리핑 대시보드">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Pretendard -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0f172a',
                        accent: '#2563eb',
                        muted: '#64748b',
                        surface: '#f8fafc',
                        border: '#e2e8f0',
                    }
                }
            }
        }
    </script>

    <style>
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        /* 뱃지 애니메이션 */
        .badge-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* 모달 오버레이 */
        .modal-overlay {
            transition: opacity 0.2s ease;
        }

        .modal-content {
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        /* 로딩 스피너 */
        .spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 행 호버 효과 */
        .news-row:hover {
            background-color: #f1f5f9;
        }

        /* 필터 칩 */
        .chip {
            transition: all 0.15s ease;
        }

        .chip.active {
            background-color: #2563eb;
            color: white;
            border-color: #2563eb;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans text-primary min-h-screen">

    <!-- ═══════════ 헤더 ═══════════ -->
    <header class="bg-white border-b border-border sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-accent rounded-lg flex items-center justify-center">
                    <span class="text-white text-sm font-bold">AI</span>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight leading-tight">뉴스 비서</h1>
                    <p class="text-xs text-muted">소상공인 종합지원 AI 뉴스</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span id="lastUpdate" class="text-xs text-muted hidden sm:inline"></span>
                <button onclick="openSettingsModal()"
                    class="inline-flex items-center gap-1 px-2.5 py-1.5 border border-border text-xs font-medium rounded-lg hover:bg-gray-50 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    설정
                </button>
                <button onclick="triggerCollection()" id="collectBtn"
                    class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-emerald-600 text-white text-xs font-semibold rounded-lg hover:bg-emerald-700 transition-colors"
                    title="GitHub Actions를 통해 최신 뉴스를 수집합니다">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    수집
                </button>
                <button onclick="toggleTTS()" id="ttsBtn"
                    class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-violet-600 text-white text-xs font-semibold rounded-lg hover:bg-violet-700 transition-colors"
                    title="AI 요약을 음성으로 읽어줍니다">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    </svg>
                    음성
                </button>
                <button onclick="loadData()" id="refreshBtn"
                    class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-accent text-white text-xs font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    새로고침
                </button>
            </div>
        </div>
    </header>

    <!-- ═══════════ 메인 ═══════════ -->
    <main class="max-w-7xl mx-auto px-4 py-4">

        <!-- 통계 카드 -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
            <div class="bg-white rounded-xl border border-border p-3">
                <p class="text-xs font-semibold text-muted uppercase tracking-wide">총 기사</p>
                <p id="statTotal" class="text-2xl font-bold mt-0.5">-</p>
            </div>
            <div class="bg-white rounded-xl border border-border p-3">
                <p class="text-xs font-semibold text-muted uppercase tracking-wide">중요 (상)</p>
                <p id="statHigh" class="text-2xl font-bold mt-0.5 text-rose-600">-</p>
            </div>
            <div class="bg-white rounded-xl border border-border p-3">
                <p class="text-xs font-semibold text-muted uppercase tracking-wide">주제</p>
                <p id="statCat" class="text-2xl font-bold mt-0.5 text-accent">-</p>
            </div>
            <div class="bg-white rounded-xl border border-border p-3">
                <p class="text-xs font-semibold text-muted uppercase tracking-wide">수집 일수</p>
                <p id="statDays" class="text-2xl font-bold mt-0.5 text-emerald-600">-</p>
            </div>
        </div>

        <!-- 필터 바 -->
        <div class="bg-white rounded-xl border border-border p-3 mb-4">
            <div class="flex flex-wrap items-center gap-3">
                <!-- 날짜 -->
                <div class="flex items-center gap-2">
                    <label class="text-xs font-semibold text-muted">날짜</label>
                    <input type="date" id="filterDate"
                        class="text-sm border border-border rounded-lg px-2 py-1 focus:ring-2 focus:ring-accent focus:border-accent outline-none">
                </div>
                <!-- 중요도 -->
                <div class="flex items-center gap-1.5">
                    <label class="text-xs font-semibold text-muted">중요도</label>
                    <button onclick="toggleImportance('상')" data-imp="상"
                        class="chip text-xs px-2.5 py-1 border border-border rounded-full font-medium active">상</button>
                    <button onclick="toggleImportance('중')" data-imp="중"
                        class="chip text-xs px-2.5 py-1 border border-border rounded-full font-medium active">중</button>
                    <button onclick="toggleImportance('하')" data-imp="하"
                        class="chip text-xs px-2.5 py-1 border border-border rounded-full font-medium active">하</button>
                </div>
                <!-- 주제 -->
                <div class="flex items-center gap-2">
                    <label class="text-xs font-semibold text-muted">주제</label>
                    <select id="filterCategory"

                        <option value="전체">전체</option>
                    </select>
                </div>
                <!-- 검색 -->
                <div class="flex-1 min-w-[150px]">
                    <input type="text" id="filterSearch" placeholder="제목 검색..."
                        class="w-full text-sm border border-border rounded-lg px-3 py-1 focus:ring-2 focus:ring-accent outline-none">
                </div>
            </div>
        </div>

        <!-- 로딩 -->
        <div id="loadingArea" class="flex flex-col items-center justify-center py-16">
            <div class="spinner mb-3"></div>
            <p class="text-sm text-muted">뉴스 데이터를 불러오는 중...</p>
        </div>

        <!-- 에러 -->
        <div id="errorArea" class="hidden bg-rose-50 border border-rose-200 rounded-xl p-4 text-center mb-4">
            <p class="text-sm text-rose-600 font-medium">⚠️ 데이터를 불러올 수 없습니다</p>
            <p class="text-xs text-rose-400 mt-1">Google Apps Script URL을 확인해주세요</p>
        </div>

        <!-- 뉴스 테이블 -->
        <div id="newsArea" class="hidden">
            <!-- 테이블 헤더 (데스크톱) -->
            <div
                class="hidden sm:flex items-center px-3 py-2 text-sm font-bold text-muted uppercase tracking-wider border-b-2 border-border">
                <div class="w-[10%]">상태</div>
                <div class="w-[35%]">기사</div>
                <div class="w-[48%]">요약</div>
                <div class="w-[7%] text-right font-bold">원문</div>
            </div>

            <!-- 뉴스 행 컨테이너 -->
            <div id="newsList"></div>

            <!-- 빈 데이터 -->
            <div id="emptyState" class="hidden text-center py-12">
                <p class="text-4xl mb-2">📭</p>
                <p class="text-sm text-muted font-medium">해당 조건에 맞는 뉴스가 없습니다</p>
            </div>
        </div>

    <!-- ═══════════ 상세 모달 ═══════════ -->
    <div id="detailModal"
        class="modal-overlay fixed inset-0 bg-black/50 z-[100] hidden flex items-end sm:items-center justify-center"
        onclick="if(event.target===this) closeModal()">
        <div
            class="modal-content bg-white w-full sm:max-w-xl sm:rounded-2xl rounded-t-2xl max-h-[85vh] overflow-y-auto">
            <!-- 모달 헤더 -->
            <div class="sticky top-0 bg-white border-b border-border px-5 py-3 flex items-center justify-between">
                <h2 class="text-sm font-bold">기사 상세</h2>
                <button onclick="closeModal()"
                    class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-100">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <!-- 모달 내용 -->
            <div id="modalBody" class="px-5 py-4 space-y-4"></div>
        </div>
    </div>

    <!-- ═══════════ 키워드 설정 모달 ═══════════ -->
    <div id="settingsModal"
        class="modal-overlay fixed inset-0 bg-black/50 z-[100] hidden flex items-end sm:items-center justify-center"
        onclick="if(event.target===this) closeSettingsModal()">
        <div
            class="modal-content bg-white w-full sm:max-w-lg sm:rounded-2xl rounded-t-2xl max-h-[85vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b border-border px-5 py-3 flex items-center justify-between">
                <h2 class="text-sm font-bold">⚙️ 주제 및 키워드 관리</h2>
                <button onclick="closeSettingsModal()"
                    class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-gray-100">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="px-5 py-4 space-y-5">
                <!-- 주제 선택 및 기준 설정 -->
                <div class="space-y-3">
                    <div>
                        <label class="text-xs font-bold text-muted uppercase block mb-1.5">1. 주제 선택</label>
                        <div class="flex gap-2">
                            <select id="settingsTopicSelect" onchange="onSettingsTopicChange()"
                                class="flex-1 text-sm border border-border rounded-lg px-3 py-2 focus:ring-2 focus:ring-accent outline-none bg-white">
                                <option value="">주제 선택...</option>
                            </select>
                            <input type="text" id="newTopicInput" placeholder="새 주제 추가..."
                                class="flex-1 text-sm border border-border rounded-lg px-3 py-2 focus:ring-2 focus:ring-accent outline-none">
                            <button onclick="addNewTopic()"
                                class="px-3 py-2 bg-gray-100 text-gray-700 text-xs font-bold rounded-lg hover:bg-gray-200 whitespace-nowrap border border-border">
                                주제 추가
                            </button>
                        </div>
                    </div>

                    <div id="topicDetailSection" class="hidden animate-in fade-in duration-300">
                        <div class="bg-blue-50 rounded-xl p-3 border border-blue-100 space-y-2">
                            <div class="flex items-center justify-between">
                                <label class="text-[11px] font-bold text-blue-700 uppercase">2. AI 중요도 판단 기준</label>
                                <button onclick="saveTopicCriteria()"
                                    class="text-[11px] font-bold text-white bg-blue-600 px-2.5 py-1 rounded-md hover:bg-blue-700">저장</button>
                            </div>
                            <textarea id="topicCriteria" rows="3"
                                placeholder="이 주제의 뉴스 중요도를 판단하는 기준을 입력하세요... (예: 정책 변화는 '상')"
                                class="w-full text-xs border border-blue-200 rounded-lg px-2.5 py-2 focus:ring-2 focus:ring-accent outline-none resize-none bg-white"></textarea>
                        </div>

                        <div class="mt-4">
                            <label class="text-[11px] font-bold text-muted uppercase block mb-1.5">3. 키워드 목록</label>
                            <div class="flex gap-2 mb-3">
                                <input type="text" id="newKeyword" placeholder="새 키워드 입력 (예: 소상공인 대출)"
                                    class="flex-1 text-sm border border-border rounded-lg px-3 py-1.5 focus:ring-2 focus:ring-accent outline-none">
                                <button onclick="addKeyword()"
                                    class="px-4 py-1.5 bg-accent text-white text-xs font-bold rounded-lg hover:bg-blue-700 whitespace-nowrap">
                                    + 추가
                                </button>
                            </div>
                            <div id="settingsList" class="space-y-1.5 max-h-[30vh] overflow-y-auto pr-1">
                                <p class="text-xs text-muted text-center py-4">주제를 선택하면 키워드가 나타납니다</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 초기 설정 모달 제거됨 -->

    <!-- ═══════════ JavaScript ═══════════ -->
    <script>
        let allNews = [];
        let allSettings = []; // [{Topic, Keyword, 활성화}]
        let topicCriteriaMap = {}; // {Topic: Criteria}
        let activeImportance = new Set(['상', '중', '하']);

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtgUJ0QfKHPn6HLt2U41OLUog92RFVaKPyLLVwQodq03LMm50qm4dwQk798D3ovFcaHw/exec';
        const CACHE_KEY = 'ai_news_cache';

        // ── 초기화 ──
        document.addEventListener('DOMContentLoaded', () => {
            // 오늘 날짜로 초기값 설정 (선택 사항, 여기서는 비워둠)
            document.getElementById('filterDate').value = '';

            // 필터 이벤트
            document.getElementById('filterDate').addEventListener('change', loadData); // 날짜 변경 시 서버에서 다시 가져옴
            document.getElementById('filterCategory').addEventListener('change', applyFilters);
            document.getElementById('filterSearch').addEventListener('input', applyFilters);

            // 데이터 로드 시작
            loadData();
        });

        // ── 데이터 로드 ──
        async function loadData() {
            const dateVal = document.getElementById('filterDate').value;
            const topicVal = document.getElementById('filterCategory').value;

            let fetchUrl = SCRIPT_URL;
            const params = [];
            if (dateVal) params.push(`date=${dateVal}`);
            if (topicVal && topicVal !== '전체') params.push(`topic=${encodeURIComponent(topicVal)}`);
            if (params.length > 0) fetchUrl += '?' + params.join('&');

            showLoading(true);
            hideError();

            try {
                const resp = await fetch(fetchUrl);
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();

                allNews = data.map(row => ({
                    날짜: formatDate(row['날짜']),
                    주제: row['주제'] || '기타',
                    언론사: row['언론사'] || '',
                    제목: row['제목'] || '제목 없음',
                    본문: row['본문 전문'] || row['본문전문'] || '',
                    링크: row['링크'] || '',
                    AI요약: row['AI 요약'] || row['AI요약'] || '',
                    중요도: row['중요도'] || '중',
                }));

                // 캐시 (필터링된 결과 저장)
                localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: allNews }));
                document.getElementById('lastUpdate').textContent = '방금 갱신됨';
                document.getElementById('lastUpdate').classList.remove('hidden');

                if (topicVal === '전체' || !topicVal) populateFilters();
                applyFilters();
            } catch (err) {
                console.error(err);
                const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
                if (cache && cache.data) {
                    allNews = cache.data;
                    const ago = Math.round((Date.now() - cache.ts) / 60000);
                    document.getElementById('lastUpdate').textContent = `${ago}분 전 캐시`;
                    document.getElementById('lastUpdate').classList.remove('hidden');
                    populateFilters();
                    applyFilters();
                } else {
                    showError();
                }
            } finally {
                showLoading(false);
            }
        }

        // ── 날짜 포맷 ──
        function formatDate(raw) {
            if (!raw) return '';
            // 이미 정확한 YYYY-MM-DD 형식이면 그대로
            if (typeof raw === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
            // ISO 8601, 구글 시트 Date 직렬화 등 모든 형식 처리
            try {
                const d = new Date(raw);
                if (!isNaN(d.getTime())) {
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const dd = String(d.getDate()).padStart(2, '0');
                    return `${y}-${m}-${dd}`;
                }
            } catch (e) { }
            return String(raw);
        }

        // ── 필터 채우기 ──
        function populateFilters() {
            const topics = [...new Set(allNews.map(n => n.주제))].sort();
            const sel = document.getElementById('filterCategory');
            const current = sel.value;
            sel.innerHTML = '<option value="전체">전체</option>';
            topics.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t; opt.textContent = t;
                sel.appendChild(opt);
            });
            sel.value = current || '전체';
        }

        // ── 중요도 토글 ──
        function toggleImportance(level) {
            if (activeImportance.has(level)) {
                if (activeImportance.size <= 1) return; // 최소 1개
                activeImportance.delete(level);
            } else {
                activeImportance.add(level);
            }
            // UI 업데이트
            document.querySelectorAll('[data-imp]').forEach(btn => {
                btn.classList.toggle('active', activeImportance.has(btn.dataset.imp));
            });
            applyFilters();
        }

        // ── 필터 적용 ──
        function applyFilters() {
            const catVal = document.getElementById('filterCategory').value;
            const searchVal = document.getElementById('filterSearch').value.toLowerCase().trim();

            const filtered = allNews.filter(n => {
                if (!activeImportance.has(n.중요도)) return false;
                if (catVal !== '전체' && n.주제 !== catVal) return false;
                if (searchVal && !n.제목.toLowerCase().includes(searchVal)) return false;
                return true;
            });

            // 최신순 정렬
            filtered.sort((a, b) => b.날짜.localeCompare(a.날짜));

            updateStats(filtered);
            renderNews(filtered);
        }

        // ── 통계 업데이트 ──
        function updateStats(data) {
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statHigh').textContent = data.filter(n => n.중요도 === '상').length;
            document.getElementById('statCat').textContent = new Set(data.map(n => n.주제)).size;
            document.getElementById('statDays').textContent = new Set(data.map(n => n.날짜)).size;
        }

        // ── 뉴스 렌더링 ──
        function renderNews(data) {
            const container = document.getElementById('newsList');
            const emptyEl = document.getElementById('emptyState');
            const newsArea = document.getElementById('newsArea');

            newsArea.classList.remove('hidden');

            if (data.length === 0) {
                container.innerHTML = '';
                emptyEl.classList.remove('hidden');
                return;
            }
            emptyEl.classList.add('hidden');

            container.innerHTML = data.map((n, i) => {
                const badgeColor = n.중요도 === '상' ? 'bg-rose-100 text-rose-700' :
                    n.중요도 === '하' ? 'bg-sky-100 text-sky-700' :
                        'bg-amber-100 text-amber-700';
                const desc = n.AI요약 || 'AI 요약 대기 중...';

                return `
            <div class="news-row flex flex-col sm:flex-row sm:items-start px-3 py-4 border-b border-border cursor-pointer transition-colors"
                 onclick="openModal(${i})" data-idx="${i}">
                <!-- 상태/분류 -->
                <div class="sm:w-[10%] flex sm:flex-col gap-1.5 mb-1.5 sm:mb-0 sm:pr-4">
                    <span class="inline-block text-[11px] font-bold px-2.5 py-1 rounded-md text-center ${badgeColor}">${n.중요도}</span>
                    <span class="inline-block text-[11px] font-medium px-2.5 py-1 rounded-md bg-gray-100 text-gray-600 border border-gray-200 text-center">${n.주제}</span>
                </div>
                <!-- 제목/출처 -->
                <div class="sm:w-[35%] sm:pr-6 mb-1.5 sm:mb-0">
                    <p class="text-base font-bold leading-tight line-clamp-2 text-gray-900">${n.제목}</p>
                    <p class="text-xs text-muted mt-1.5 font-medium">${n.언론사} <span class="mx-1">·</span> ${n.날짜}</p>
                </div>
                <!-- 요약 -->
                <div class="sm:w-[48%] sm:pr-4">
                    <p class="text-sm text-gray-600 leading-relaxed line-clamp-3">${desc}</p>
                </div>
                <!-- 원문 링크 -->
                <div class="sm:w-[7%] flex items-center justify-end mt-2 sm:mt-0">
                    ${n.링크 ? `<a href="${n.링크}" target="_blank" rel="noopener" onclick="event.stopPropagation()"
                        class="inline-flex items-center gap-1 text-sm font-bold text-accent hover:text-blue-700 hover:underline whitespace-nowrap bg-blue-50 px-2 py-1 rounded-lg">
                        ↗ 원문
                    </a>` : ''}
                </div>
            </div>`;
            }).join('');
        }

        // ── 모달 ──
        function openModal(idx) {
            const filtered = getCurrentFiltered();
            const n = filtered[idx];
            if (!n) return;

            const badgeColor = n.중요도 === '상' ? 'bg-rose-100 text-rose-700' :
                n.중요도 === '하' ? 'bg-sky-100 text-sky-700' :
                    'bg-amber-100 text-amber-700';

            document.getElementById('modalBody').innerHTML = `
            <div class="flex items-center gap-2 flex-wrap">
                <span class="text-xs font-bold px-2.5 py-1 rounded-full ${badgeColor}">${n.중요도}</span>
                <span class="text-xs font-medium px-2.5 py-1 rounded-full bg-gray-100 text-gray-600">${n.주제}</span>
                <span class="text-xs text-muted">${n.언론사} · ${n.날짜}</span>
            </div>
            <h3 class="text-lg font-bold leading-tight text-gray-900">${n.제목}</h3>
            ${n.링크 ? `<a href="${n.링크}" target="_blank" rel="noopener"
                class="inline-flex items-center gap-1 text-sm text-accent font-bold hover:underline">
                ↗ 원문 보기
            </a>` : ''}
            ${n.AI요약 ? `
            <div class="pt-2">
                <p class="text-xs font-bold text-muted uppercase mb-2 tracking-wider">AI 브리핑</p>
                <div class="text-base text-gray-800 leading-relaxed bg-blue-50 rounded-xl p-4 border border-blue-100 shadow-sm">${n.AI요약}</div>
            </div>` : `
            <div class="bg-amber-50 border border-amber-100 rounded-lg p-4">
                <p class="text-sm text-amber-700 font-medium">⌛ AI 요약이 생성되지 않았습니다. 다음 뉴스 수집 시 생성됩니다.</p>
            </div>`}
            ${n.본문 ? `
            <div class="pt-2">
                <p class="text-xs font-bold text-muted uppercase mb-2 tracking-wider">기사 전문</p>
                <div class="text-sm text-gray-600 leading-relaxed max-h-[40vh] overflow-y-auto bg-gray-50 rounded-xl p-4 border border-border shadow-inner">${n.본문.substring(0, 3000)}${n.본문.length > 3000 ? '...' : ''}</div>
            </div>` : ''}
        `;

            document.getElementById('detailModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        // ESC로 모달 닫기
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

        // 현재 필터된 데이터 가져오기 (모달 인덱스용)
        function getCurrentFiltered() {
            const catVal = document.getElementById('filterCategory').value;
            const searchVal = document.getElementById('filterSearch').value.toLowerCase().trim();

            return allNews.filter(n => {
                if (!activeImportance.has(n.중요도)) return false;
                if (catVal !== '전체' && n.주제 !== catVal) return false;
                if (searchVal && !n.제목.toLowerCase().includes(searchVal)) return false;
                return true;
            }).sort((a, b) => b.날짜.localeCompare(a.날짜));
        }

        // ── 초기 설정 모달 ──
        function showSetupModal() {
            showLoading(false);
            document.getElementById('setupModal').classList.remove('hidden');
        }

        function saveSetupUrl() {
            const url = document.getElementById('setupUrlInput').value.trim();
            if (!url.startsWith('https://script.google.com/')) {
                alert('올바른 Google Apps Script URL을 입력해주세요.');
                return;
            }
            localStorage.setItem(STORAGE_KEY, url);
            document.getElementById('setupModal').classList.add('hidden');
            loadData();
        }

        function saveScriptUrl() {
            // 하드코딩 방식으로 변경되어 사용하지 않음
        }

        // ── 키워드 및 주제 설정 관리 ──
        function openSettingsModal() {
            document.getElementById('settingsModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            loadSettings();
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        async function loadSettings() {
            const url = SCRIPT_URL;
            showSettingsLoading(true);

            try {
                // 키워드와 주제별 기준을 동시에 로드
                const [settingsResp, criteriaResp] = await Promise.all([
                    fetch(url + '?tab=Settings'),
                    fetch(url + '?tab=Topic_Settings')
                ]);

                let sData = await settingsResp.json();
                let cData = await criteriaResp.json();

                // GAS에서 탭이 없으면 객체(에러 메시지)를 리턴할 수 있으므로 배열인지 확인
                allSettings = Array.isArray(sData) ? sData : [];
                const criteriaData = Array.isArray(cData) ? cData : [];

                topicCriteriaMap = {};
                criteriaData.forEach(item => {
                    const t = item['주제'] || item['Topic'] || item['카테고리'];
                    const c = item['기준'] || item['Criteria'];
                    if (t) topicCriteriaMap[t] = c;
                });

                populateSettingsTopicSelect();
            } catch (err) {
                console.error('Settings load error:', err);
                document.getElementById('settingsList').innerHTML = '<p class="text-xs text-rose-500 text-center py-4">설정을 불러올 수 없습니다.</p>';
            } finally {
                showSettingsLoading(false);
            }
        }

        function populateSettingsTopicSelect() {
            const topicsFromSettings = [...new Set(allSettings.map(s => s['주제'] || s['카테고리']))];
            const topicsFromCriteria = Object.keys(topicCriteriaMap);
            const allTopics = [...new Set([...topicsFromSettings, ...topicsFromCriteria])].filter(Boolean).sort();

            const sel = document.getElementById('settingsTopicSelect');
            const current = sel.value;
            sel.innerHTML = '<option value="">주제 선택...</option>';
            allTopics.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t; opt.textContent = t;
                sel.appendChild(opt);
            });
            if (current && allTopics.includes(current)) {
                sel.value = current;
            }
        }

        function onSettingsTopicChange() {
            const topic = document.getElementById('settingsTopicSelect').value;
            const detailSection = document.getElementById('topicDetailSection');

            if (!topic) {
                detailSection.classList.add('hidden');
                return;
            }

            detailSection.classList.remove('hidden');

            // 기준 로드
            document.getElementById('topicCriteria').value = topicCriteriaMap[topic] || '';

            // 키워드 목록 필터링 및 렌더링
            renderFilteredKeywords(topic);
        }

        function renderFilteredKeywords(topic) {
            const container = document.getElementById('settingsList');
            const keywords = allSettings.filter(s => (s['주제'] || s['카테고리']) === topic);

            if (keywords.length === 0) {
                container.innerHTML = '<p class="text-xs text-muted text-center py-4">등록된 키워드가 없습니다</p>';
                return;
            }

            container.innerHTML = keywords.map((s, i) => {
                const isActive = String(s['활성화'] || '').toUpperCase() === 'TRUE';
                return `
                    <div class="flex items-center gap-2 px-3 py-2 rounded-lg border border-border bg-white shadow-sm">
                        <button onclick="toggleKeyword('${topic}', '${s['키워드']}')" class="w-5 h-5 rounded border-2 flex items-center justify-center text-[10px]
                            ${isActive ? 'border-accent bg-accent text-white' : 'border-gray-300 bg-white'}">
                            ${isActive ? '✓' : ''}
                        </button>
                        <span class="text-sm font-medium flex-1 text-gray-700">${s['키워드'] || ''}</span>
                        <button onclick="deleteKeyword('${topic}', '${s['키워드']}')" class="w-6 h-6 flex items-center justify-center text-gray-400 hover:text-rose-500 hover:bg-rose-50 rounded transition-colors">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>`;
            }).join('');
        }

        async function addNewTopic() {
            const name = document.getElementById('newTopicInput').value.trim();
            if (!name) return;

            if (topicCriteriaMap[name]) {
                alert('이미 존재하는 주제입니다.');
                return;
            }

            showSettingsLoading(true);
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'updateTopicCriteria', topic: name, criteria: '' }),
                });
                document.getElementById('newTopicInput').value = '';
                await loadSettings();
                document.getElementById('settingsTopicSelect').value = name;
                onSettingsTopicChange();
            } catch (err) {
                alert('주제 추가 실패: ' + err.message);
            } finally {
                showSettingsLoading(false);
            }
        }

        async function saveTopicCriteria() {
            const topic = document.getElementById('settingsTopicSelect').value;
            const criteria = document.getElementById('topicCriteria').value.trim();
            if (!topic) return;

            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '저장 중...';
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'updateTopicCriteria', topic, criteria }),
                });
                topicCriteriaMap[topic] = criteria;
                btn.textContent = '✅ 저장됨';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.disabled = false;
                }, 1500);
            } catch (err) {
                alert('기준 저장 실패: ' + err.message);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        async function addKeyword() {
            const topic = document.getElementById('settingsTopicSelect').value;
            const keyword = document.getElementById('newKeyword').value.trim();
            if (!topic || !keyword) { alert('주제와 키워드를 확인해주세요.'); return; }

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'addKeyword', topic, keyword }),
                });
                document.getElementById('newKeyword').value = '';
                await loadSettings();
                onSettingsTopicChange();
            } catch (err) {
                alert('키워드 추가 실패: ' + err.message);
            }
        }

        async function deleteKeyword(topic, keyword) {
            if (!confirm(`'${keyword}' 키워드를 삭제하시겠습니까?`)) return;
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'deleteKeyword', topic, keyword }),
                });
                await loadSettings();
                onSettingsTopicChange();
            } catch (err) {
                alert('삭제 실패: ' + err.message);
            }
        }

        async function toggleKeyword(topic, keyword) {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'toggleKeyword', topic, keyword }),
                });
                await loadSettings();
                onSettingsTopicChange();
            } catch (err) {
                alert('상태 변경 실패: ' + err.message);
            }
        }

        function showSettingsLoading(show) {
            if (show) {
                document.getElementById('settingsList').innerHTML = '<div class="flex justify-center py-8"><div class="spinner w-6 h-6 border-2"></div></div>';
            }
        }

        // ── UI 헬퍼 ──
        function showLoading(show) {
            document.getElementById('loadingArea').classList.toggle('hidden', !show);
            if (show) {
                document.getElementById('newsArea').classList.add('hidden');
            }
        }
        function showError() {
            document.getElementById('errorArea').classList.remove('hidden');
        }
        function hideError() {
            document.getElementById('errorArea').classList.add('hidden');
        }

        // ══════════════════════════════════════════
        // ── 🔊 음성 브리핑 (Web Speech API) ──
        // ══════════════════════════════════════════
        let isSpeaking = false;
        let speechQueue = [];
        let currentUtterance = null;

        function toggleTTS() {
            if (isSpeaking) {
                stopTTS();
                return;
            }
            startTTS();
        }

        function startTTS() {
            if (!window.speechSynthesis) {
                alert('이 브라우저는 음성 읽기를 지원하지 않습니다.');
                return;
            }

            // 버튼 상태: 로딩
            isSpeaking = true;
            const btn = document.getElementById('ttsBtn');
            btn.classList.remove('bg-violet-600', 'hover:bg-violet-700');
            btn.classList.add('bg-rose-600', 'hover:bg-rose-700');
            btn.innerHTML = `<svg class="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> 로딩...`;

            // Briefing 탭에서 AI 대본 가져오기 시도
            const url = localStorage.getItem(STORAGE_KEY);
            if (url) {
                fetch(url + '?tab=Briefing')
                    .then(r => r.json())
                    .then(data => {
                        if (data && data.length > 0) {
                            const latest = data[data.length - 1];
                            const script = latest['대본'] || latest['script'] || null;
                            if (script) { playBriefingScript(script); return; }
                        }
                        playFallbackTTS();
                    })
                    .catch(() => playFallbackTTS());
            } else {
                playFallbackTTS();
            }
        }

        function playBriefingScript(script) {
            const sentences = script.split(/(?<=[.!?。])\s*/);
            speechQueue = [];
            let chunk = '';
            for (const s of sentences) {
                if ((chunk + s).length > 200) {
                    if (chunk) speechQueue.push(chunk.trim());
                    chunk = s;
                } else {
                    chunk += (chunk ? ' ' : '') + s;
                }
            }
            if (chunk) speechQueue.push(chunk.trim());
            updateTTSBtnPlaying();
            speakNext();
        }

        function playFallbackTTS() {
            const filtered = getCurrentFiltered();
            const newsWithSummary = filtered.filter(n => n.AI요약);
            if (newsWithSummary.length === 0) {
                alert('브리핑 대본이 없고, AI 요약도 없습니다.\n뉴스를 먼저 수집해 주세요.');
                stopTTS();
                return;
            }
            const today = new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric' });
            speechQueue = [`${today} AI 뉴스 브리핑입니다. 총 ${newsWithSummary.length}건.`];
            newsWithSummary.forEach((n, i) => {
                speechQueue.push(`${i + 1}번. ${n.주제}. ${n.제목}.`);
                speechQueue.push(n.AI요약);
            });
            speechQueue.push('이상 브리핑을 마칩니다.');
            updateTTSBtnPlaying();
            speakNext();
        }

        function updateTTSBtnPlaying() {
            const btn = document.getElementById('ttsBtn');
            btn.innerHTML = `<svg class="w-3.5 h-3.5 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"/></svg> 정지`;
        }


        function speakNext() {
            if (speechQueue.length === 0 || !isSpeaking) {
                stopTTS();
                return;
            }

            const text = speechQueue.shift();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 1.05;
            utterance.pitch = 1.0;

            // 한국어 음성 선택 시도
            const voices = speechSynthesis.getVoices();
            const koVoice = voices.find(v => v.lang.startsWith('ko'));
            if (koVoice) utterance.voice = koVoice;

            utterance.onend = () => speakNext();
            utterance.onerror = () => speakNext();

            currentUtterance = utterance;
            speechSynthesis.speak(utterance);
        }

        function stopTTS() {
            isSpeaking = false;
            speechQueue = [];
            speechSynthesis.cancel();

            const btn = document.getElementById('ttsBtn');
            btn.classList.remove('bg-rose-600', 'hover:bg-rose-700');
            btn.classList.add('bg-violet-600', 'hover:bg-violet-700');
            btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg> 음성`;
        }

        // 음성 목록 로드 (일부 브라우저에서 비동기)
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();

        // ══════════════════════════════════════════
        // ── 🔄 수동 뉴스 수집 (Apps Script 경유) ──
        // ══════════════════════════════════════════
        async function triggerCollection() {
            const url = SCRIPT_URL;

            const btn = document.getElementById('collectBtn');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<svg class="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> 수집 중...`;
            btn.classList.add('opacity-70');

            try {
                await fetch(url, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: 'triggerWorkflow' }),
                });
                btn.innerHTML = `✅ 수집 시작됨!`;
                btn.classList.remove('bg-emerald-600');
                btn.classList.add('bg-emerald-500');
                // 2분 후 자동 새로고침
                setTimeout(() => {
                    loadData();
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    btn.classList.remove('opacity-70', 'bg-emerald-500');
                    btn.classList.add('bg-emerald-600');
                }, 120000);
            } catch (err) {
                alert('뉴스 수집 요청 실패: ' + err.message);
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                btn.classList.remove('opacity-70');
            }
        }
    </script>
</body>

</html>
