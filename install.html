<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 뉴스 비서 | 앱 설치</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-sm w-full glass border border-white/20 rounded-3xl shadow-2xl p-8 text-center">
        <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/30">
            <span class="text-white text-2xl font-black">AI</span>
        </div>
        <h1 class="text-2xl font-bold text-slate-900 mb-2">뉴스 비서</h1>
        <p class="text-slate-500 mb-8 text-sm leading-relaxed">매일 아침 배달되는 소상공인 맞춤 AI 뉴스.<br>앱으로 설치해서 더 편하게 확인하세요.</p>
        
        <div id="installSection" class="hidden space-y-3">
            <button id="installBtn" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition-all shadow-md shadow-blue-200 active:scale-95 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                앱 설치하기
            </button>
            <p class="text-[11px] text-slate-400">설치 시 홈 화면에서 바로 소식을 받을 수 있습니다.</p>
        </div>

        <div id="loadingSection" class="space-y-4">
            <div class="flex justify-center">
                <div class="w-8 h-8 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin"></div>
            </div>
            <p class="text-sm text-slate-400">시스템 확인 중...</p>
        </div>

        <div id="manualSection" class="hidden mt-6 pt-6 border-t border-slate-100 text-left">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">수동 설치 방법</p>
            <div class="space-y-3 text-sm text-slate-600">
                <div class="flex gap-3">
                    <span class="bg-slate-100 w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0">1</span>
                    <p>브라우저 메뉴(점 3개 또는 공유 버튼)를 누릅니다.</p>
                </div>
                <div class="flex gap-3">
                    <span class="bg-slate-100 w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0">2</span>
                    <p><b>[앱 설치]</b> 또는 <b>[홈 화면에 추가]</b>를 선택합니다.</p>
                </div>
            </div>
        </div>

        <button onclick="location.href='index.html'" class="mt-8 text-sm font-bold text-blue-600 hover:underline">
            웹으로 계속하기 →
        </button>
    </div>

    <script>
        let deferredPrompt;
        const installSection = document.getElementById('installSection');
        const loadingSection = document.getElementById('loadingSection');
        const manualSection = document.getElementById('manualSection');
        const installBtn = document.getElementById('installBtn');

        // 이미 설치되어 있는지 확인
        if (window.matchMedia('(display-mode: standalone)').matches) {
            location.href = 'index.html';
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            loadingSection.classList.add('hidden');
            installSection.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installSection.innerHTML = '<p class="text-emerald-600 font-bold">🎉 설치가 시작되었습니다!</p>';
                setTimeout(() => location.href = 'index.html', 2000);
            }
            deferredPrompt = null;
        });

        // 5초 후에도 응답이 없으면 수동 설치 안내 표시
        setTimeout(() => {
            if (loadingSection.classList.contains('hidden')) return;
            loadingSection.classList.add('hidden');
            manualSection.classList.remove('hidden');
            installSection.classList.remove('hidden');
            installBtn.textContent = '앱 수동 설치 안내';
            installBtn.classList.remove('bg-blue-600');
            installBtn.classList.add('bg-slate-100', 'text-slate-700', 'shadow-none');
        }, 5000);

        // 서비스 워커 등록 (설치 가능성 확보)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
